<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#0f172a"/>
  <!-- Clock face ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Tick marks at 12 / 3 / 6 / 9 -->
  <line x1="16" y1="4"  x2="16" y2="7"  stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="16" x2="25" y2="16" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="16" y2="25" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4"  y1="16" x2="7"  y2="16" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hour hand → 10 o'clock -->
  <line x1="16" y1="16" x2="9"  y2="12" stroke="#f1f5f9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand → 2 o'clock -->
  <line x1="16" y1="16" x2="23" y2="12" stroke="#3b82f6" stroke-width="2"   stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#f1f5f9"/>
</svg>
